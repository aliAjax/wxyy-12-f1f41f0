<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>业务系统</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <header>
      <div class="topline">
        <div>
          <h1 id="title">业务系统</h1>
          <p class="lede" id="lede"></p>
        </div>
        <div class="header-right">
          <div id="userInfo" class="user-info"></div>
          <button class="secondary" id="refreshBtn">刷新数据</button>
        </div>
      </div>
      <nav class="tabs" id="tabs"></nav>
    </header>
    <main id="main"></main>
  </div>
  <div class="toast" id="toast"></div>
  <div class="modal" id="photoModal">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="photoModalTitle">照片证据</h2>
        <button class="ghost" data-close-modal>关闭</button>
      </div>
      <div class="modal-body" id="photoModalBody"></div>
    </div>
  </div>
  <div class="modal" id="auditModal">
    <div class="modal-backdrop" data-close-audit></div>
    <div class="modal-content wide">
      <div class="modal-header">
        <div class="modal-header-left">
          <button class="ghost" id="auditBackBtn" data-back-audit style="display:none;">← 返回</button>
          <h2 id="auditModalTitle">审计时间线</h2>
        </div>
        <button class="ghost" data-close-audit>关闭</button>
      </div>
      <div class="modal-body" id="auditModalBody"></div>
    </div>
  </div>
  <div class="modal" id="diffModal">
    <div class="modal-backdrop" data-close-diff></div>
    <div class="modal-content wide">
      <div class="modal-header">
        <h2 id="diffModalTitle">变更详情</h2>
        <button class="ghost" data-close-diff>关闭</button>
      </div>
      <div class="modal-body" id="diffModalBody"></div>
    </div>
  </div>
  <div class="modal" id="loginModal">
    <div class="modal-backdrop" data-close-login></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>用户登录</h2>
        <button class="ghost" data-close-login>关闭</button>
      </div>
      <div class="modal-body">
        <form id="loginForm">
          <label>用户名
            <input type="text" name="username" required placeholder="请输入用户名">
          </label>
          <label>密码
            <input type="password" name="password" required placeholder="请输入密码">
          </label>
          <div class="login-hint">
            <p><strong>测试账号：</strong></p>
            <p>管理员：admin / admin123</p>
            <p>巡测员：surveyor / surveyor123</p>
            <p>审核员：reviewer / reviewer123</p>
          </div>
          <div class="actions">
            <button type="submit">登录</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <div class="modal" id="siteEditModal">
    <div class="modal-backdrop" data-close-site-edit></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="siteEditModalTitle">编辑样点</h2>
        <button class="ghost" data-close-site-edit>关闭</button>
      </div>
      <div class="modal-body" id="siteEditModalBody"></div>
    </div>
  </div>
  <div class="modal" id="riskRecalcModal">
    <div class="modal-backdrop" data-close-risk-recalc></div>
    <div class="modal-content wide">
      <div class="modal-header">
        <h2 id="riskRecalcModalTitle">基准值已变更 - 重新计算风险</h2>
        <button class="ghost" data-close-risk-recalc>关闭</button>
      </div>
      <div class="modal-body" id="riskRecalcModalBody"></div>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
