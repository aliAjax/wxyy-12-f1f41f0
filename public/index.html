<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>业务系统</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <header>
      <div class="topline">
        <div>
          <h1 id="title">业务系统</h1>
          <p class="lede" id="lede"></p>
        </div>
        <button class="secondary" id="refreshBtn">刷新数据</button>
      </div>
      <nav class="tabs" id="tabs"></nav>
    </header>
    <main id="main"></main>
  </div>
  <div class="toast" id="toast"></div>
  <div class="modal" id="photoModal">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="photoModalTitle">照片证据</h2>
        <button class="ghost" data-close-modal>关闭</button>
      </div>
      <div class="modal-body" id="photoModalBody"></div>
    </div>
  </div>
  <div class="modal" id="auditModal">
    <div class="modal-backdrop" data-close-audit></div>
    <div class="modal-content wide">
      <div class="modal-header">
        <h2 id="auditModalTitle">审计时间线</h2>
        <button class="ghost" data-close-audit>关闭</button>
      </div>
      <div class="modal-body" id="auditModalBody"></div>
    </div>
  </div>
  <div class="modal" id="diffModal">
    <div class="modal-backdrop" data-close-diff></div>
    <div class="modal-content wide">
      <div class="modal-header">
        <h2 id="diffModalTitle">变更详情</h2>
        <button class="ghost" data-close-diff>关闭</button>
      </div>
      <div class="modal-body" id="diffModalBody"></div>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
